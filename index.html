<!DOCTYPE html>
<html>
<head>
<title>Chess Board with Manual Powers</title>
<style>

.controls{
    margin-top:20px;
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:wrap;
}

.tool-btn{
    margin:5px;
    padding:6px 12px;
    background:#222;
    color:white;
    border:1px solid #555;
    cursor:pointer;
}

.tool-btn:hover{
    background:#444;
}

.tool-btn.active{
    background:#553300;
    border-color:#ff9900;
    color:#ff9900;
}

.effect-red{
    filter: drop-shadow(0 0 6px red) drop-shadow(0 0 3px red);
}

body {
    font-family: Arial;
    text-align: center;
    background-color: #0d1117;
    margin: 0;
    padding: 20px;
    color: white;
}

.container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 20px;
}

.board {
    width: 480px;
    height: 480px;
    background-image: url('IMG/IMG/chessboard.png');
    background-size: cover;
    display: grid;
    grid-template-columns: repeat(8, 60px);
    grid-template-rows: repeat(8, 60px);
}

.square {
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.square.selected {
    outline: 2px solid red;
}

img.piece {
    width: 50px;
    height: 50px;
    user-select: none;
    pointer-events: none;
}

#powersContainer, #activePowersContainer {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
}

.power-btn {
    margin: 5px 0;
    padding: 5px 10px;
    cursor: pointer;
    background-color: #222;
    border: 1px solid #555;
    color: white;
}

.power-btn:hover {
    background-color: #555;
}

.active-power {
    margin: 5px 0;
    padding: 5px 10px;
    background-color: #444;
    border: 1px solid #888;
}

/* Piece picker panel */
#piecePicker {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #1a1f2e;
    border: 2px solid #556;
    border-radius: 10px;
    padding: 20px;
    z-index: 1000;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

#piecePicker h3 {
    margin: 0 0 15px 0;
    color: #ccc;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.picker-section {
    margin-bottom: 14px;
}

.picker-label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
}

.picker-row {
    display: flex;
    gap: 6px;
}

.picker-piece {
    width: 52px;
    height: 52px;
    background: #222;
    border: 2px solid #444;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
}

.picker-piece:hover {
    background: #333;
    border-color: #aaa;
}

.picker-piece.selected-piece {
    border-color: #ff9900;
    background: #332200;
}

.picker-piece img {
    width: 42px;
    height: 42px;
}

#pickerCancel {
    margin-top: 14px;
    padding: 6px 20px;
    background: #333;
    color: #aaa;
    border: 1px solid #555;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    width: 100%;
}

#pickerCancel:hover {
    background: #444;
}

#pickerOverlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 999;
}

</style>
</head>
<body>

<!-- Piece Picker Overlay -->
<div id="pickerOverlay" onclick="closePicker()"></div>
<div id="piecePicker">
    <h3>Select a piece to place</h3>
    <div class="picker-section">
        <div class="picker-label">White</div>
        <div class="picker-row" id="whitePieces"></div>
    </div>
    <div class="picker-section">
        <div class="picker-label">Black</div>
        <div class="picker-row" id="blackPieces"></div>
    </div>
    <button id="pickerCancel" onclick="closePicker()">Cancel</button>
</div>

<div class="controls">
    <button class="tool-btn" id="btnAdd" onclick="openPicker()">➕ Add Piece</button>
    <button class="tool-btn" id="btnRemove" onclick="setMode('remove')">🗑 Remove Piece</button>
    <button class="tool-btn" id="btnEffect" onclick="setMode('effect')">✨ Color Effect</button>
</div>

<h1>Shared Chess Board</h1>
<h2 id="turn">Current Turn: White</h2>
<button id="resetBtn">Reset Board</button>

<div class="container">
    <div id="board" class="board"></div>
    <div id="powersContainer"></div>
    <div id="activePowersContainer">
        <h3>Active Powers</h3>
    </div>
</div>

<script>

let pieces = [
    "Br","Bn","Bb","Bq","Bk","Bb","Bn","Br",
    "Bp","Bp","Bp","Bp","Bp","Bp","Bp","Bp",
    "","","","","","","","",
    "","","","","","","","",
    "","","","","","","","",
    "","","","","","","","",
    "Wp","Wp","Wp","Wp","Wp","Wp","Wp","Wp",
    "Wr","Wn","Wb","Wq","Wk","Wb","Wn","Wr"
];

// Persistent effects: set of square indices with red glow
let effects = new Set();

let selected = null;
let turn = "White";
let turnCount = 0;

let mode = "move"; // move | remove | effect | add
let addPieceType = null;

const WHITE_PIECES = ["Wp","Wn","Wb","Wr","Wq","Wk"];
const BLACK_PIECES = ["Bp","Bn","Bb","Br","Bq","Bk"];
const PIECE_LABELS  = {
    "p":"Pawn","n":"Knight","b":"Bishop","r":"Rook","q":"Queen","k":"King"
};

let powerPool = [];
for(let i=1;i<=20;i++){
    powerPool.push({name:`Power${i}`, duration:3});
}

let currentPowers = [];
let activePowers = [];

// ── Piece Picker ─────────────────────────────────────────────────────────────

function buildPicker(){
    function makeBtn(code){
        let btn = document.createElement("div");
        btn.className = "picker-piece";
        btn.title = PIECE_LABELS[code[1].toLowerCase()] || code;
        btn.dataset.code = code;
        let img = document.createElement("img");
        img.src = `IMG/IMG/${code}.png`;
        img.alt = code;
        btn.appendChild(img);
        btn.onclick = () => selectPickerPiece(code);
        return btn;
    }
    let wRow = document.getElementById("whitePieces");
    let bRow = document.getElementById("blackPieces");
    WHITE_PIECES.forEach(c => wRow.appendChild(makeBtn(c)));
    BLACK_PIECES.forEach(c => bRow.appendChild(makeBtn(c)));
}

function openPicker(){
    addPieceType = null;
    // clear selection highlight
    document.querySelectorAll(".picker-piece").forEach(b => b.classList.remove("selected-piece"));
    document.getElementById("pickerOverlay").style.display = "block";
    document.getElementById("piecePicker").style.display = "block";
    setModeBtn("add");
}

function closePicker(){
    document.getElementById("pickerOverlay").style.display = "none";
    document.getElementById("piecePicker").style.display = "none";
    if(!addPieceType) {
        mode = "move";
        setModeBtn(null);
    }
}

function selectPickerPiece(code){
    addPieceType = code;
    mode = "add";
    document.querySelectorAll(".picker-piece").forEach(b => {
        b.classList.toggle("selected-piece", b.dataset.code === code);
    });
    // close picker after a short delay so user sees the highlight
    setTimeout(() => {
        document.getElementById("pickerOverlay").style.display = "none";
        document.getElementById("piecePicker").style.display = "none";
    }, 200);
}

// ── Mode Buttons ──────────────────────────────────────────────────────────────

function setModeBtn(active){
    ["btnAdd","btnRemove","btnEffect"].forEach(id => {
        document.getElementById(id).classList.remove("active");
    });
    if(active === "add")    document.getElementById("btnAdd").classList.add("active");
    if(active === "remove") document.getElementById("btnRemove").classList.add("active");
    if(active === "effect") document.getElementById("btnEffect").classList.add("active");
}

function setMode(m){
    mode = m;
    if(m === "remove") setModeBtn("remove");
    if(m === "effect") setModeBtn("effect");
}

// ── Board ─────────────────────────────────────────────────────────────────────

function drawBoard(){
    let board = document.getElementById("board");
    board.innerHTML = "";

    for(let i=0; i<64; i++){
        let square = document.createElement("div");
        square.className = "square";
        if(i === selected) square.classList.add("selected");

        if(pieces[i] !== ""){
            let img = document.createElement("img");
            img.className = "piece";
            img.src = `IMG/IMG/${pieces[i]}.png`;
            // Re-apply persistent effect
            if(effects.has(i)) img.classList.add("effect-red");
            square.appendChild(img);
        }

        square.onclick = () => clickSquare(i);
        board.appendChild(square);
    }

    document.getElementById("turn").innerText = `Current Turn: ${turn}`;
}

function clickSquare(i){

    if(mode === "remove"){
        pieces[i] = "";
        effects.delete(i);
        mode = "move";
        setModeBtn(null);
        drawBoard();
        return;
    }

    if(mode === "add"){
        if(addPieceType){
            pieces[i] = addPieceType;
            drawBoard();
        }
        // Stay in add mode so user can place more of the same piece
        // They can click another piece in picker or press another tool to exit
        return;
    }

    if(mode === "effect"){
        // Toggle persistent effect
        if(effects.has(i)){
            effects.delete(i);
        } else {
            effects.add(i);
        }
        mode = "move";
        setModeBtn(null);
        drawBoard();
        return;
    }

    // Default: move mode
    if(selected === null){
        if(pieces[i] !== ""){
            selected = i;
            drawBoard();
        }
    } else {
        if(selected === i){
            selected = null;
            drawBoard();
            return;
        }

        // Move piece; carry effect with it
        let hadEffect = effects.has(selected);
        effects.delete(selected);
        effects.delete(i);
        if(hadEffect) effects.add(i);

        pieces[i] = pieces[selected];
        pieces[selected] = "";
        selected = null;

        turnCount++;
        activePowers.forEach(p => p.duration--);
        activePowers = activePowers.filter(p => p.duration > 0);

        turn = (turn === "White") ? "Black" : "White";

        currentPowers = [...powerPool]
            .sort(() => Math.random() - 0.5)
            .slice(0, 3);

        drawBoard();
        drawPowers();
    }
}

// ── Powers ────────────────────────────────────────────────────────────────────

function drawPowers(){
    let powersDiv = document.getElementById("powersContainer");
    powersDiv.innerHTML = "";

    currentPowers.forEach((power, index) => {
        let btn = document.createElement("button");
        btn.className = "power-btn";
        btn.innerText = power.name;
        btn.onclick = () => pickPower(power, index);
        powersDiv.appendChild(btn);
    });

    let activeDiv = document.getElementById("activePowersContainer");
    activeDiv.innerHTML = "<h3>Active Powers</h3>";

    activePowers.forEach(p => {
        let div = document.createElement("div");
        div.className = "active-power";
        div.innerText = `${p.name} (${p.duration} turns left)`;
        activeDiv.appendChild(div);
    });
}

function pickPower(power, index){
    activePowers.push({...power});
    currentPowers.splice(index, 1);
    drawPowers();
}

// ── Reset ─────────────────────────────────────────────────────────────────────

document.getElementById("resetBtn").onclick = () => {
    pieces = [
        "Br","Bn","Bb","Bq","Bk","Bb","Bn","Br",
        "Bp","Bp","Bp","Bp","Bp","Bp","Bp","Bp",
        "","","","","","","","",
        "","","","","","","","",
        "","","","","","","","",
        "","","","","","","","",
        "Wp","Wp","Wp","Wp","Wp","Wp","Wp","Wp",
        "Wr","Wn","Wb","Wq","Wk","Wb","Wn","Wr"
    ];
    effects.clear();
    selected = null;
    turn = "White";
    turnCount = 0;
    mode = "move";
    addPieceType = null;
    setModeBtn(null);
    currentPowers = [];
    activePowers = [];
    drawBoard();
    drawPowers();
};

// ── Init ──────────────────────────────────────────────────────────────────────

buildPicker();
drawBoard();
drawPowers();

</script>
</body>
</html>
