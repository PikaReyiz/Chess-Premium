<!DOCTYPE html>
<html>
<head>
<title>Chess Board</title>
<style>
body {
    font-family: Arial;
    text-align: center;
}

.board {
    display: grid;
    grid-template-columns: repeat(8, 60px);
    width: 480px;
    height: 480px;
    margin: auto;
    position: relative;
    background-image: url('images/chessboard.png');
    background-size: cover;
}

.square {
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.square.selected {
    outline: 2px solid red;
}

img.piece {
    width: 50px;
    height: 50px;
    user-select: none;
}
</style>
</head>

<body>

<h1>Shared Chess Board</h1>

<div id="board" class="board"></div>

<script>
// Piece positions using filenames
let pieces = [
    "br","bn","bb","bq","bk","bb","bn","br",
    "bp","bp","bp","bp","bp","bp","bp","bp",
    "","","","","","","","",
    "","","","","","","","",
    "","","","","","","","",
    "","","","","","","","",
    "wp","wp","wp","wp","wp","wp","wp","wp",
    "wr","wn","wb","wq","wk","wb","wn","wr"
];

let selected = null;

// Draw the board and pieces
function draw() {
    let board = document.getElementById("board");
    board.innerHTML = "";

    for (let i = 0; i < 64; i++) {
        let square = document.createElement("div");
        square.className = "square";
        if (i === selected) square.classList.add("selected");

        if (pieces[i] != "") {
            let img = document.createElement("img");
            img.src = "images/" + pieces[i] + ".png";
            img.className = "piece";
            square.appendChild(img);
        }

        square.onclick = () => clickSquare(i);
        board.appendChild(square);
    }
}

// Handle piece selection and movement
function clickSquare(i) {
    if (selected === null) {
        if (pieces[i] !== "") selected = i; // only select non-empty squares
    } else {
        pieces[i] = pieces[selected];
        pieces[selected] = "";
        selected = null;
    }
    draw();
}

// Initial draw
draw();
</script>

</body>
</html>
