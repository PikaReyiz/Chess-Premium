<!DOCTYPE html>
<html>
<head>
<title>Chess Board</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background-color: #0d1117;
    margin: 0;
    padding: 20px;
}

.board {
    position: relative;
    width: 480px;
    height: 480px;
    margin: auto;
    background-color: #0d1117;
    background-image: url('IMG/IMG/chessboard.png');
    background-size: cover;
    background-position: center;
    display: grid;
    grid-template-columns: repeat(8, 60px);
    grid-template-rows: repeat(8, 60px);
}

.square {
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.square.selected {
    outline: 2px solid red;
}

img.piece {
    width: 50px;
    height: 50px;
    user-select: none;
}

#turn {
    color: white;
    margin-bottom: 10px;
}

#resetBtn {
    margin-bottom: 20px;
    padding: 5px 15px;
    font-size: 16px;
}
</style>
</head>
<body>

<h1 style="color:white;">Shared Chess Board</h1>

<h2 id="turn">Current Turn: White</h2>
<button id="resetBtn">Reset Board</button>

<div id="board" class="board"></div>

<script>
let pieces = [
    "Br","Bn","Bb","Bq","Bk","Bb","Bn","Br",
    "Bp","Bp","Bp","Bp","Bp","Bp","Bp","Bp",
    "","","","","","","","",
    "","","","","","","","",
    "","","","","","","","",
    "","","","","","","","",
    "Wp","Wp","Wp","Wp","Wp","Wp","Wp","Wp",
    "Wr","Wn","Wb","Wq","Wk","Wb","Wn","Wr"
];

let selected = null;
let turn = "White";

function draw() {
    let board = document.getElementById("board");
    board.innerHTML = "";

    for (let i = 0; i < 64; i++) {
        let square = document.createElement("div");
        square.className = "square";
        if (i === selected) square.classList.add("selected");

        if (pieces[i] !== "") {
            let img = document.createElement("img");
            img.className = "piece";
            img.src = `IMG/IMG/${pieces[i]}.png`;
            square.appendChild(img);
        }

        square.onclick = () => clickSquare(i);
        board.appendChild(square);
    }

    document.getElementById("turn").innerText = `Current Turn: ${turn}`;
}

function clickSquare(i) {
    if (selected === null) {
        if (pieces[i] !== "") selected = i; 
    } else {
        pieces[i] = pieces[selected];
        pieces[selected] = "";
        selected = null;
        // Switch turn only after a move
        turn = (turn === "White") ? "Black" : "White";
    }
    draw();
}

document.getElementById("resetBtn").onclick = function() {
    pieces = [
        "Br","Bn","Bb","Bq","Bk","Bb","Bn","Br",
        "Bp","Bp","Bp","Bp","Bp","Bp","Bp","Bp",
        "","","","","","","","",
        "","","","","","","","",
        "","","","","","","","",
        "","","","","","","","",
        "Wp","Wp","Wp","Wp","Wp","Wp","Wp","Wp",
        "Wr","Wn","Wb","Wq","Wk","Wb","Wn","Wr"
    ];
    selected = null;
    turn = "White";
    draw();
}

draw();
</script>

</body>
</html>
