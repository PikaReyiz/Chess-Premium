<!DOCTYPE html>
<html>
<head>
<title>Chess Board with Timed Powers</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background-color: #0d1117;
    margin: 0;
    padding: 20px;
    color: white;
}

.board {
    position: relative;
    width: 480px;
    height: 480px;
    margin: auto;
    background-color: #0d1117;
    background-image: url('IMG/IMG/chessboard.png');
    background-size: cover;
    background-position: center;
    display: grid;
    grid-template-columns: repeat(8, 60px);
    grid-template-rows: repeat(8, 60px);
}

.square {
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.square.selected {
    outline: 2px solid red;
}

img.piece {
    width: 50px;
    height: 50px;
    user-select: none;
}

#powers {
    margin-top: 20px;
}

button {
    font-size: 14px;
    padding: 5px 10px;
    cursor: pointer;
    margin: 3px;
    display: block;
}
</style>
</head>
<body>

<h1>Shared Chess Board</h1>
<h2 id="turn">Current Turn: White</h2>
<button id="resetBtn">Reset Board</button>
<div id="board" class="board"></div>

<h3>Powers (appear every 3 turns)</h3>
<div id="powers"></div>

<script>
// --- Chess pieces setup ---
let pieces = [
    "Br","Bn","Bb","Bq","Bk","Bb","Bn","Br",
    "Bp","Bp","Bp","Bp","Bp","Bp","Bp","Bp",
    "","","","","","","","",
    "","","","","","","","",
    "","","","","","","","",
    "","","","","","","","",
    "Wp","Wp","Wp","Wp","Wp","Wp","Wp","Wp",
    "Wr","Wn","Wb","Wq","Wk","Wb","Wn","Wr"
];

let selected = null;
let turn = "White";
let turnCount = 0; // total turns taken

// --- Powers setup ---
let powerPool = [
    { name: "Swap", description: "Swap two random pieces", duration: 0, effect: () => swapPieces() },
    { name: "Double Move", description: "Move again immediately", duration: 0, effect: () => alert("Double Move!") },
    { name: "Shield", description: "Protect a piece for 2 turns", duration: 2, effect: () => alert("Shield active!") },
    { name: "Chaos", description: "Shuffle 5 random pieces", duration: 0, effect: () => chaosPieces() },
    { name: "Freeze", description: "Opponent skips next turn", duration: 1, effect: () => alert("Opponent frozen!") },
    { name: "Extra Pawn", description: "Spawn extra pawn", duration: 0, effect: () => alert("Extra Pawn spawned!") }
];

let activePowers = []; // powers waiting to activate
let currentPowers = []; // 3 random powers for this turn

// --- Pick powers every 3 turns ---
function checkPickPowers() {
    if (turnCount % 3 === 0) { // every 3 turns
        currentPowers = [...powerPool].sort(() => 0.5 - Math.random()).slice(0,3);
        drawPowers();
    } else {
        currentPowers = [];
        drawPowers();
    }
}

// --- Draw board ---
function draw() {
    let board = document.getElementById("board");
    board.innerHTML = "";

    for (let i = 0; i < 64; i++) {
        let square = document.createElement("div");
        square.className = "square";
        if (i === selected) square.classList.add("selected");

        if (pieces[i] !== "") {
            let img = document.createElement("img");
            img.className = "piece";
            img.src = `IMG/IMG/${pieces[i]}.png`;
            square.appendChild(img);
        }

        square.onclick = () => clickSquare(i);
        board.appendChild(square);
    }

    document.getElementById("turn").innerText = `Current Turn: ${turn}`;
}

// --- Draw powers ---
function drawPowers() {
    const powersDiv = document.getElementById("powers");
    powersDiv.innerHTML = "";

    currentPowers.forEach((power, index) => {
        const btn = document.createElement("button");
        btn.innerText = `${power.name} - ${power.description} ${power.duration>0 ? "(duration "+power.duration+" turns)" : ""}`;
        btn.disabled = selected===null; // must select piece to use
        btn.onclick = () => {
            usePower(power);
        };
        powersDiv.appendChild(btn);
    });

    // Show active powers
    activePowers.forEach(power => {
        const info = document.createElement("div");
        info.innerText = `${power.name} activates in ${power.duration} turn(s)`;
        powersDiv.appendChild(info);
    });
}

// --- Use a power ---
function usePower(power) {
    if (power.duration>0) {
        activePowers.push({...power}); // copy to active
    } else {
        power.effect();
    }
    currentPowers = [];
    drawPowers();
}

// --- Handle piece selection and move ---
function clickSquare(i) {
    if (selected === null) {
        if (pieces[i] !== "") selected = i; 
    } else {
        pieces[i] = pieces[selected];
        pieces[selected] = "";
        selected = null;

        turnCount++;
        // --- Reduce duration of active powers ---
        activePowers.forEach(p => {
            p.duration--;
        });
        // Trigger powers that reach 0
        activePowers.filter(p => p.duration<=0).forEach(p => p.effect());
        activePowers = activePowers.filter(p => p.duration>0);

        // Switch turn
        turn = (turn==="White")?"Black":"White";
        checkPickPowers();
    }
    draw();
}

// --- Example chaotic power functions ---
function swapPieces() {
    let a = Math.floor(Math.random()*64);
    let b = Math.floor(Math.random()*64);
    let temp = pieces[a];
    pieces[a] = pieces[b];
    pieces[b] = temp;
    alert(`Swapped positions ${a} and ${b}!`);
}

function chaosPieces() {
    for (let i=0;i<5;i++){
        let a=Math.floor(Math.random()*64);
        let b=Math.floor(Math.random()*64);
        let temp = pieces[a];
        pieces[a] = pieces[b];
        pieces[b] = temp;
    }
    alert("Shuffled 5 random pieces!");
}

// --- Reset board ---
document.getElementById("resetBtn").onclick = function() {
    pieces = [
        "Br","Bn","Bb","Bq","Bk","Bb","Bn","Br",
        "Bp","Bp","Bp","Bp","Bp","Bp","Bp","Bp",
        "","","","","","","","",
        "","","","","","","","",
        "","","","","","","","",
        "","","","","","","","",
        "Wp","Wp","Wp","Wp","Wp","Wp","Wp","Wp",
        "Wr","Wn","Wb","Wq","Wk","Wb","Wn","Wr"
    ];
    selected = null;
    turn = "White";
    turnCount = 0;
    activePowers = [];
    currentPowers = [];
    draw();
    checkPickPowers();
}

draw();
checkPickPowers();
</script>

</body>
</html>
