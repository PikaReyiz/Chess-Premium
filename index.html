<!DOCTYPE html>
<html>
<head>
<title>Chess Board with Manual Powers</title>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>

.controls{
    margin-top:20px;
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:wrap;
}

.tool-btn{
    margin:5px;
    padding:6px 12px;
    background:#2c2c2c;
    color:#c8b89a;
    border:1px solid #4a3728;
    cursor:pointer;
    border-radius:4px;
}

.tool-btn:hover{
    background:#3d2f22;
}

.tool-btn.active{
    background:#5c3a1a;
    border-color:#ff9900;
    color:#ff9900;
}

/* Extra turn button */
#extraTurnBtn {
    padding: 6px 16px;
    background: #1a2a1a;
    color: #44ff88;
    border: 1px solid #44ff88;
    cursor: pointer;
    font-size: 13px;
    border-radius: 4px;
    transition: background 0.15s;
}
#extraTurnBtn:hover { background: #223322; }

/* Bottom controls under board */
.board-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.bottom-controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    width: 480px;
}

.bottom-btn {
    flex: 1;
    min-width: 100px;
    padding: 7px 10px;
    background: #2c2c2c;
    color: #c8b89a;
    border: 1px solid #4a3728;
    cursor: pointer;
    font-size: 12px;
    border-radius: 4px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
}
.bottom-btn:hover { background: #3d2f22; border-color: #7a5c3a; color: #e8d4b0; }
.bottom-btn.active { background: #5c3a1a; border-color: #ff9900; color: #ff9900; }

/* Pulsing tile border effect */
@keyframes tile-pulse {
    0%   { box-shadow: inset 0 0 0 3px var(--tc), 0 0 6px 1px var(--tc); opacity: 1; }
    50%  { box-shadow: inset 0 0 0 3px var(--tc), 0 0 14px 4px var(--tc); opacity: 0.6; }
    100% { box-shadow: inset 0 0 0 3px var(--tc), 0 0 6px 1px var(--tc); opacity: 1; }
}

.square.tile-effect {
    animation: tile-pulse 1.4s ease-in-out infinite;
    position: relative;
    z-index: 0;
}

/* highlighted random square flash */
.square.highlight-flash {
    outline: 3px solid #ff9900;
    background: rgba(255,153,0,0.18);
}


body {
    font-family: Arial;
    text-align: center;
    background-color: #1a1a1a;
    margin: 0;
    padding: 20px;
    color: #c8b89a;
}

.container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 20px;
}

.board {
    width: 480px;
    height: 480px;
    display: grid;
    grid-template-columns: repeat(8, 60px);
    grid-template-rows: repeat(8, 60px);
    border: 3px solid #4a3728;
    box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 0 1px #6b4f3a;
}

.square {
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

/* Chess.com style alternating squares - set by JS */
.square.light { background-color: #f0d9b5; }
.square.dark  { background-color: #b58863; }
.square.light:hover { background-color: #e8d082; }
.square.dark:hover  { background-color: #cfa55a; }

.square.selected {
    background-color: #f6f669 !important;
    outline: none;
}

img.piece {
    width: 50px;
    height: 50px;
    user-select: none;
    pointer-events: none;
}

/* ── Power Sidebar ── */
#powerSidebar {
    width: 220px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    font-family: Arial;
}

#powerSidebar h3 {
    margin: 0 0 6px 0;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #9a7c5a;
    border-bottom: 1px solid #4a3728;
    padding-bottom: 6px;
}

.active-power-card {
    background: #252525;
    border: 1px solid #3a2e22;
    border-left: 3px solid #6b4f3a;
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 12px;
    line-height: 1.6;
}

.active-power-card.white-power { border-left-color: #f0d9b5; }
.active-power-card.black-power { border-left-color: #b58863; }
.active-power-card.pending     { border-left-color: #ff9900; opacity: 0.8; }

.power-card-name {
    font-size: 13px;
    font-weight: bold;
    color: #ddd;
    margin-bottom: 2px;
}

.power-card-effect {
    color: #999;
    font-size: 11px;
    margin-bottom: 4px;
}

.power-card-timer {
    font-size: 11px;
    color: #aaa;
}

.power-card-timer span {
    font-weight: bold;
    color: #ff9900;
}

.no-powers-msg {
    color: #444;
    font-size: 12px;
    font-style: italic;
}

/* Power pick modal */
#powerPickModal {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #13181f;
    border: 2px solid #334;
    border-radius: 12px;
    padding: 24px;
    z-index: 1000;
    box-shadow: 0 0 60px rgba(0,0,0,0.9);
    min-width: 320px;
    max-width: 380px;
}

#powerPickModal h3 {
    margin: 0 0 6px 0;
    font-size: 15px;
    color: #fff;
    text-align: center;
}

#powerPickModal .pick-subtitle {
    text-align: center;
    font-size: 12px;
    color: #666;
    margin-bottom: 18px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.power-option {
    background: #1a2030;
    border: 2px solid #2a3040;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
}

.power-option:hover {
    background: #222d40;
    border-color: #ff9900;
}

.power-option-name {
    font-size: 14px;
    font-weight: bold;
    color: #eee;
    margin-bottom: 4px;
}

.power-option-desc {
    font-size: 12px;
    color: #888;
    line-height: 1.4;
}

.power-option-duration {
    margin-top: 6px;
    font-size: 11px;
    color: #ff9900;
}

/* Color Effect Picker */
#effectPicker {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #1a1f2e;
    border: 2px solid #556;
    border-radius: 10px;
    padding: 20px;
    z-index: 1000;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    min-width: 260px;
}

#effectPicker h3 {
    margin: 0 0 15px 0;
    color: #ccc;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.color-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 10px;
}

.color-swatch {
    width: 52px;
    height: 52px;
    border-radius: 8px;
    border: 3px solid transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    transition: border-color 0.15s, transform 0.1s;
}

.color-swatch:hover {
    transform: scale(1.08);
    border-color: white;
}

.color-swatch.selected-color {
    border-color: white;
    transform: scale(1.08);
}

.remove-swatch {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
    background: #2a2a2a;
    border: 2px dashed #666;
    border-radius: 8px;
    color: #aaa;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s, border-color 0.15s;
}

.remove-swatch:hover {
    background: #333;
    border-color: #aaa;
    color: white;
}

#effectCancel {
    margin-top: 10px;
    padding: 6px 20px;
    background: #333;
    color: #aaa;
    border: 1px solid #555;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    width: 100%;
}

#effectCancel:hover { background: #444; }


#piecePicker {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #1a1f2e;
    border: 2px solid #556;
    border-radius: 10px;
    padding: 20px;
    z-index: 1000;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

#piecePicker h3 {
    margin: 0 0 15px 0;
    color: #ccc;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.picker-section {
    margin-bottom: 14px;
}

.picker-label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
}

.picker-row {
    display: flex;
    gap: 6px;
}

.picker-piece {
    width: 52px;
    height: 52px;
    background: #222;
    border: 2px solid #444;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
}

.picker-piece:hover {
    background: #333;
    border-color: #aaa;
}

.picker-piece.selected-piece {
    border-color: #ff9900;
    background: #332200;
}

.picker-piece img {
    width: 42px;
    height: 42px;
}

#pickerCancel {
    margin-top: 14px;
    padding: 6px 20px;
    background: #333;
    color: #aaa;
    border: 1px solid #555;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    width: 100%;
}

#pickerCancel:hover {
    background: #444;
}

#pickerOverlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 999;
}

</style>
</head>
<body>

<!-- Color Effect Picker -->
<div id="effectPicker">
    <h3>Choose a glow color</h3>
    <div class="color-grid" id="colorGrid"></div>
    <button class="remove-swatch" onclick="selectColor(null)">🚫 Remove Effect</button>
    <button id="effectCancel" onclick="closeEffectPicker()">Cancel</button>
</div>

<!-- Power Pick Modal -->
<div id="powerPickModal">
    <h3 id="powerPickTitle">Choose a Power</h3>
    <div class="pick-subtitle" id="powerPickSubtitle"></div>
    <div id="powerOptions"></div>
</div>

<!-- Piece Picker Overlay -->

<div id="pickerOverlay" onclick="closePicker()"></div>
<div id="piecePicker">
    <h3>Select a piece to place</h3>
    <div class="picker-section">
        <div class="picker-label">White</div>
        <div class="picker-row" id="whitePieces"></div>
    </div>
    <div class="picker-section">
        <div class="picker-label">Black</div>
        <div class="picker-row" id="blackPieces"></div>
    </div>
    <button id="pickerCancel" onclick="closePicker()">Cancel</button>
</div>

<div class="controls">
    <button class="tool-btn" id="btnAdd" onclick="openPicker()">➕ Add Piece</button>
    <button class="tool-btn" id="btnRemove" onclick="setMode('remove')">🗑 Remove Piece</button>
    <button id="extraTurnBtn" onclick="grantExtraTurn()">⚡ Extra Turn</button>
</div>

<h1 style="color:#c8b89a; margin:10px 0 4px 0; font-size:22px;">Shared Chess Board</h1>
<h2 id="turn" style="color:#9a7c5a; margin:4px 0 10px 0; font-size:16px; font-weight:normal;">Current Turn: White</h2>
<button id="resetBtn" style="padding:6px 18px;background:#2c2c2c;color:#c8b89a;border:1px solid #4a3728;border-radius:4px;cursor:pointer;">Reset Board</button>

<div class="container">
    <div class="board-wrapper">
        <div id="board" class="board"></div>
        <div class="bottom-controls">
            <button class="bottom-btn" id="btnEffect" onclick="openEffectPicker()">✨ Piece Glow</button>
            <button class="bottom-btn" id="btnTileEffect" onclick="openTileEffectPicker()">🔲 Tile Effect</button>
            <button class="bottom-btn" onclick="pickRandomSquare('empty')">🎲 Random Empty</button>
            <button class="bottom-btn" onclick="pickRandomSquare('occupied')">🎲 Random Piece</button>
            <button class="bottom-btn" onclick="pickRandomSquare('any')">🎲 Random Any</button>
        </div>
    </div>
    <div id="powerSidebar">
        <h3>Active Powers</h3>
        <div id="activePowersList"><span class="no-powers-msg">No powers yet</span></div>
    </div>
</div>

<script>

// ── Firebase Setup ────────────────────────────────────────────────────────────

const firebaseConfig = {
    apiKey: "AIzaSyDA1qYhXQbVUNWLZXczXWmHlX6hsAF6LOM",
    authDomain: "chess2premium.firebaseapp.com",
    databaseURL: "https://chess2premium-default-rtdb.firebaseio.com",
    projectId: "chess2premium",
    storageBucket: "chess2premium.firebasestorage.app",
    messagingSenderId: "36978087717",
    appId: "1:36978087717:web:89e130b2ec6450500f2ccc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const gameRef = db.ref("game");

// ── Local State ───────────────────────────────────────────────────────────────

let pieces = [
    "Br","Bn","Bb","Bq","Bk","Bb","Bn","Br",
    "Bp","Bp","Bp","Bp","Bp","Bp","Bp","Bp",
    "","","","","","","","",
    "","","","","","","","",
    "","","","","","","","",
    "","","","","","","","",
    "Wp","Wp","Wp","Wp","Wp","Wp","Wp","Wp",
    "Wr","Wn","Wb","Wq","Wk","Wb","Wn","Wr"
];

let effects    = new Map(); // square index → color (piece glow)
let tileEffects= new Map(); // square index → color (tile pulse)
let selected   = null;
let turn       = "White";
let globalMoveCount = 0;
let activePowers    = [];
let mode            = "move";
let addPieceType    = null;
let extraTurnPending= false;
let isRemoteUpdate  = false; // prevent feedback loop

const WHITE_PIECES = ["Wp","Wn","Wb","Wr","Wq","Wk"];
const BLACK_PIECES = ["Bp","Bn","Bb","Br","Bq","Bk"];
const PIECE_LABELS = { "p":"Pawn","n":"Knight","b":"Bishop","r":"Rook","q":"Queen","k":"King" };

// ── Firebase Sync Helpers ─────────────────────────────────────────────────────

function serializeState(){
    return {
        pieces:          pieces,
        turn:            turn,
        globalMoveCount: globalMoveCount,
        activePowers:    activePowers.map(p => ({
            powerId:         p.power.id,
            owner:           p.owner,
            turnsUntilActive:p.turnsUntilActive,
            turnsRemaining:  p.turnsRemaining
        })),
        effects:     Object.fromEntries(effects),
        tileEffects: Object.fromEntries(tileEffects),
        extraTurnPending: extraTurnPending
    };
}

function deserializeState(data){
    pieces          = data.pieces || pieces;
    turn            = data.turn   || "White";
    globalMoveCount = data.globalMoveCount || 0;
    extraTurnPending= data.extraTurnPending || false;

    effects     = new Map(Object.entries(data.effects     || {}).map(([k,v]) => [Number(k), v]));
    tileEffects = new Map(Object.entries(data.tileEffects || {}).map(([k,v]) => [Number(k), v]));

    // Rebuild activePowers from IDs
    activePowers = (data.activePowers || []).map(p => {
        let power = ALL_POWERS.find(ap => ap.id === p.powerId);
        if(!power) return null;
        return { power, owner: p.owner, turnsUntilActive: p.turnsUntilActive, turnsRemaining: p.turnsRemaining };
    }).filter(Boolean);
}

function pushState(){
    if(isRemoteUpdate) return;
    gameRef.set(serializeState());
}

// Listen for remote changes
gameRef.on("value", snapshot => {
    const data = snapshot.val();
    if(!data) return;
    isRemoteUpdate = true;
    deserializeState(data);

    // Sync extra turn button visually
    let etBtn = document.getElementById("extraTurnBtn");
    if(extraTurnPending){
        etBtn.style.background  = "#1a3a1a";
        etBtn.style.borderColor = "#44ff88";
        etBtn.style.color       = "#44ff88";
        etBtn.innerText = "⚡ Extra Turn (ON)";
    } else {
        etBtn.style.background  = "";
        etBtn.style.borderColor = "";
        etBtn.style.color       = "";
        etBtn.innerText = "⚡ Extra Turn";
    }

    drawBoard();
    drawPowerSidebar();
    isRemoteUpdate = false;
});

// ── Power System ──────────────────────────────────────────────────────────────

// =============================================================================
// HOW TO ADD MORE POWERS:
// Just add a new object to ALL_POWERS below following this format:
//   { id:"unique_id", name:"Display Name", effect:"Description of the effect",
//     activatesAfter: 0,   ← turns before it becomes active (0 = instant)
//     duration: 2 }        ← how many of that player's turns it stays active
// =============================================================================
const ALL_POWERS = [
    { id:"double_move",  name:"Double Move",     effect:"Take two moves next turn instead of one",        activatesAfter:0, duration:1 },
    { id:"shield",       name:"Shield",           effect:"Your pieces cannot be captured this turn",       activatesAfter:0, duration:1 },
    { id:"ghost",        name:"Ghost",            effect:"One of your pieces can pass through others",     activatesAfter:0, duration:2 },
    { id:"freeze",       name:"Freeze",           effect:"One enemy piece cannot move for 2 turns",       activatesAfter:1, duration:2 },
    { id:"resurrect",    name:"Resurrect",        effect:"Bring back a captured pawn",                    activatesAfter:1, duration:1 },
    { id:"swap",         name:"Swap",             effect:"Swap any two of your pieces on the board",      activatesAfter:0, duration:1 },
    { id:"blitz",        name:"Blitz",            effect:"Move any piece twice in one turn",              activatesAfter:0, duration:1 },
    { id:"fortify",      name:"Fortify",          effect:"A chosen piece cannot be captured for 3 turns", activatesAfter:0, duration:3 },
    { id:"plague",       name:"Plague",           effect:"Enemy pieces adjacent to yours lose 1 move",    activatesAfter:1, duration:2 },
    { id:"oracle",       name:"Oracle",           effect:"See your opponent's next planned move",         activatesAfter:0, duration:1 },
    { id:"teleport",     name:"Teleport",         effect:"Move one piece to any empty square",            activatesAfter:0, duration:1 },
    { id:"mirror",       name:"Mirror",           effect:"Copy the last power your opponent used",        activatesAfter:0, duration:1 },
    { id:"slow",         name:"Slow Field",       effect:"Opponent can only move pawns next turn",        activatesAfter:1, duration:1 },
    { id:"reinforce",    name:"Reinforce",        effect:"Add an extra pawn to any empty square",         activatesAfter:0, duration:1 },
    { id:"hex",          name:"Hex",              effect:"One enemy piece moves randomly next turn",      activatesAfter:1, duration:1 },
    { id:"bloodlust",    name:"Bloodlust",        effect:"Captured pieces grant +1 extra move this turn", activatesAfter:0, duration:2 },
    { id:"cloak",        name:"Cloak",            effect:"Your back row is hidden from opponent",         activatesAfter:0, duration:2 },
    { id:"timewarp",     name:"Time Warp",        effect:"Undo the opponent's last move",                 activatesAfter:0, duration:1 },
    { id:"adrenaline",   name:"Adrenaline",       effect:"Your king can move 2 squares this turn",        activatesAfter:0, duration:1 },
    { id:"earthquake",   name:"Earthquake",       effect:"All pawns on rank 4 and 5 are displaced",      activatesAfter:1, duration:1 },
    // ↓ Add your own powers here ↓
];

function getThreeRandomPowers(){
    return [...ALL_POWERS].sort(() => Math.random()-0.5).slice(0,3);
}

function checkForPowerUnlock(justMoved){
    let mod = globalMoveCount % 6;
    if(mod === 3 && justMoved === "White"){
        openPowerPick("White");
    } else if(mod === 0 && globalMoveCount > 0 && justMoved === "Black"){
        openPowerPick("Black");
    }
}

function openPowerPick(player){
    let options = getThreeRandomPowers();
    document.getElementById("powerPickTitle").innerText = `${player}'s Power Pick`;
    document.getElementById("powerPickSubtitle").innerText = `Move ${globalMoveCount} — choose one`;
    let optDiv = document.getElementById("powerOptions");
    optDiv.innerHTML = "";
    options.forEach(p => {
        let card = document.createElement("div");
        card.className = "power-option";
        card.innerHTML = `
            <div class="power-option-name">${p.name}</div>
            <div class="power-option-desc">${p.effect}</div>
            <div class="power-option-duration">${p.activatesAfter > 0 ? `Activates in ${p.activatesAfter} turn${p.activatesAfter>1?'s':''} · ` : ''}Active for ${p.duration} turn${p.duration>1?'s':''}</div>
        `;
        card.onclick = () => pickPower(p, player);
        optDiv.appendChild(card);
    });
    document.getElementById("pickerOverlay").style.display = "block";
    document.getElementById("powerPickModal").style.display = "block";
}

function pickPower(power, player){
    activePowers.push({
        power: power,
        owner: player,
        turnsUntilActive: power.activatesAfter,
        turnsRemaining:   power.duration
    });
    document.getElementById("pickerOverlay").style.display = "none";
    document.getElementById("powerPickModal").style.display = "none";
    drawPowerSidebar();
    pushState();
}

function tickPowers(justMovedPlayer){
    activePowers.forEach(p => {
        if(p.turnsUntilActive > 0) p.turnsUntilActive--;
        else p.turnsRemaining--;
    });
    activePowers = activePowers.filter(p => p.turnsRemaining > 0 || p.turnsUntilActive > 0);
}

function drawPowerSidebar(){
    let list = document.getElementById("activePowersList");
    list.innerHTML = "";
    if(activePowers.length === 0){
        list.innerHTML = '<span class="no-powers-msg">No powers yet</span>';
        return;
    }
    ["White","Black"].forEach(player => {
        let playerPowers = activePowers.filter(p => p.owner === player);
        if(playerPowers.length === 0) return;
        let header = document.createElement("div");
        header.style.cssText = "font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin:8px 0 4px 0;";
        header.innerText = player;
        list.appendChild(header);
        playerPowers.forEach(p => {
            let card = document.createElement("div");
            let colorClass = player === "White" ? "white-power" : "black-power";
            let isPending  = p.turnsUntilActive > 0;
            card.className = `active-power-card ${colorClass}${isPending ? " pending" : ""}`;
            let timerText  = isPending
                ? `Activates in: <span>${p.turnsUntilActive} turn${p.turnsUntilActive>1?'s':''}</span>`
                : `Remaining turns: <span>${p.turnsRemaining}</span>`;
            card.innerHTML = `
                <div class="power-card-name">${p.power.name}${isPending ? " ⏳" : " ✅"}</div>
                <div class="power-card-effect">${p.power.effect}</div>
                <div class="power-card-timer">${timerText}</div>
            `;
            list.appendChild(card);
        });
    });
}

// ── Color Effect Picker ───────────────────────────────────────────────────────

const EFFECT_COLORS = [
    { name:"Red",    hex:"#ff2222" },
    { name:"Orange", hex:"#ff8800" },
    { name:"Yellow", hex:"#ffee00" },
    { name:"Green",  hex:"#22ff44" },
    { name:"Cyan",   hex:"#00eeff" },
    { name:"Blue",   hex:"#2266ff" },
    { name:"Purple", hex:"#aa22ff" },
    { name:"Pink",   hex:"#ff44cc" },
    { name:"White",  hex:"#ffffff" },
    { name:"Gold",   hex:"#ffd700" },
    { name:"Lime",   hex:"#aaff00" },
    { name:"Teal",   hex:"#00ffcc" },
];

let selectedEffectColor = "#ff2222";
let selectedTileColor   = "#ff2222";

function buildEffectPicker(){
    let grid = document.getElementById("colorGrid");
    EFFECT_COLORS.forEach(c => {
        let swatch = document.createElement("div");
        swatch.className   = "color-swatch";
        swatch.title       = c.name;
        swatch.dataset.hex = c.hex;
        swatch.style.background = c.hex;
        swatch.style.boxShadow  = `0 0 8px ${c.hex}88`;
        swatch.innerText   = c.name;
        if(c.hex === selectedEffectColor) swatch.classList.add("selected-color");
        swatch.onclick = () => selectColor(c.hex);
        grid.appendChild(swatch);
    });
}

function openEffectPicker(){
    document.getElementById("pickerOverlay").style.display = "block";
    document.getElementById("effectPicker").style.display  = "block";
    document.getElementById("effectPicker").querySelector("h3").innerText = "Choose a glow color";
    document.querySelectorAll(".color-swatch").forEach(s => {
        s.classList.toggle("selected-color", s.dataset.hex === selectedEffectColor);
        s.onclick = () => selectColor(s.dataset.hex);
    });
    document.querySelector(".remove-swatch").onclick = () => selectColor(null);
    setModeBtn("effect");
}

function closeEffectPicker(){
    document.getElementById("pickerOverlay").style.display = "none";
    document.getElementById("effectPicker").style.display  = "none";
    mode = "move";
    setModeBtn(null);
}

function selectColor(hex){
    selectedEffectColor = hex;
    document.querySelectorAll(".color-swatch").forEach(s => {
        s.classList.toggle("selected-color", s.dataset.hex === hex);
    });
    mode = "effect";
    setTimeout(() => {
        document.getElementById("pickerOverlay").style.display = "none";
        document.getElementById("effectPicker").style.display  = "none";
    }, 150);
}

// ── Tile Effect Picker ────────────────────────────────────────────────────────

function openTileEffectPicker(){
    document.getElementById("pickerOverlay").style.display = "block";
    document.getElementById("effectPicker").style.display  = "block";
    document.getElementById("effectPicker").querySelector("h3").innerText = "Choose a tile pulse color";
    document.querySelectorAll(".color-swatch").forEach(s => {
        s.classList.toggle("selected-color", s.dataset.hex === selectedTileColor);
        s.onclick = () => selectTileColor(s.dataset.hex);
    });
    document.querySelector(".remove-swatch").onclick = () => selectTileColor(null);
    setModeBtn("tileEffect");
}

function selectTileColor(hex){
    selectedTileColor = hex;
    mode = "tileEffect";
    setTimeout(() => {
        document.getElementById("pickerOverlay").style.display = "none";
        document.getElementById("effectPicker").style.display  = "none";
    }, 150);
}

// ── Piece Picker ──────────────────────────────────────────────────────────────

function buildPicker(){
    function makeBtn(code){
        let btn = document.createElement("div");
        btn.className      = "picker-piece";
        btn.title          = PIECE_LABELS[code[1].toLowerCase()] || code;
        btn.dataset.code   = code;
        let img            = document.createElement("img");
        img.src            = `IMG/IMG/${code}.png`;
        img.alt            = code;
        btn.appendChild(img);
        btn.onclick = () => selectPickerPiece(code);
        return btn;
    }
    let wRow = document.getElementById("whitePieces");
    let bRow = document.getElementById("blackPieces");
    WHITE_PIECES.forEach(c => wRow.appendChild(makeBtn(c)));
    BLACK_PIECES.forEach(c => bRow.appendChild(makeBtn(c)));
}

function openPicker(){
    addPieceType = null;
    document.querySelectorAll(".picker-piece").forEach(b => b.classList.remove("selected-piece"));
    document.getElementById("pickerOverlay").style.display = "block";
    document.getElementById("piecePicker").style.display   = "block";
    setModeBtn("add");
}

function closePicker(){
    document.getElementById("pickerOverlay").style.display = "none";
    document.getElementById("piecePicker").style.display   = "none";
    if(!addPieceType){ mode = "move"; setModeBtn(null); }
}

function selectPickerPiece(code){
    addPieceType = code;
    mode = "add";
    document.querySelectorAll(".picker-piece").forEach(b => {
        b.classList.toggle("selected-piece", b.dataset.code === code);
    });
    setTimeout(() => {
        document.getElementById("pickerOverlay").style.display = "none";
        document.getElementById("piecePicker").style.display   = "none";
    }, 200);
}

// ── Extra Turn ────────────────────────────────────────────────────────────────

let extraTurnPendingLocal = false; // local copy to avoid loop

function grantExtraTurn(){
    extraTurnPending = !extraTurnPending;
    extraTurnPendingLocal = extraTurnPending;
    let btn = document.getElementById("extraTurnBtn");
    if(extraTurnPending){
        btn.style.background  = "#1a3a1a";
        btn.style.borderColor = "#44ff88";
        btn.style.color       = "#44ff88";
        btn.innerText = "⚡ Extra Turn (ON)";
    } else {
        btn.style.background  = "";
        btn.style.borderColor = "";
        btn.style.color       = "";
        btn.innerText = "⚡ Extra Turn";
    }
    pushState();
}

// ── Random Square Pickers ─────────────────────────────────────────────────────

function pickRandomSquare(type){
    let candidates = [];
    for(let i = 0; i < 64; i++){
        if(type === "empty"    && pieces[i] === "") candidates.push(i);
        if(type === "occupied" && pieces[i] !== "") candidates.push(i);
        if(type === "any")                          candidates.push(i);
    }
    if(candidates.length === 0) return;
    let pick = candidates[Math.floor(Math.random() * candidates.length)];
    let sq   = document.getElementById("board").children[pick];
    if(sq){
        sq.classList.add("highlight-flash");
        setTimeout(() => sq.classList.remove("highlight-flash"), 1200);
    }
}

// ── Mode Buttons ──────────────────────────────────────────────────────────────

function setModeBtn(active){
    ["btnAdd","btnRemove","btnEffect","btnTileEffect"].forEach(id => {
        document.getElementById(id).classList.remove("active");
    });
    if(active === "add")        document.getElementById("btnAdd").classList.add("active");
    if(active === "remove")     document.getElementById("btnRemove").classList.add("active");
    if(active === "effect")     document.getElementById("btnEffect").classList.add("active");
    if(active === "tileEffect") document.getElementById("btnTileEffect").classList.add("active");
}

function setMode(m){
    mode = m;
    if(m === "remove") setModeBtn("remove");
    if(m === "effect") setModeBtn("effect");
}

// ── Board ─────────────────────────────────────────────────────────────────────

function drawBoard(){
    let board = document.getElementById("board");
    board.innerHTML = "";
    for(let i = 0; i < 64; i++){
        let square = document.createElement("div");
        square.className = "square";
        // Chess.com style alternating squares
        let row = Math.floor(i / 8);
        let col = i % 8;
        square.classList.add((row + col) % 2 === 0 ? "light" : "dark");
        if(i === selected) square.classList.add("selected");
        if(tileEffects.has(i)){
            square.classList.add("tile-effect");
            square.style.setProperty("--tc", tileEffects.get(i));
        }
        if(pieces[i] !== ""){
            let img    = document.createElement("img");
            img.className = "piece";
            img.src    = `IMG/IMG/${pieces[i]}.png`;
            if(effects.has(i)){
                let col = effects.get(i);
                img.style.filter = `drop-shadow(0 0 6px ${col}) drop-shadow(0 0 3px ${col})`;
            }
            square.appendChild(img);
        }
        square.onclick = () => clickSquare(i);
        board.appendChild(square);
    }
    document.getElementById("turn").innerText = `Current Turn: ${turn}`;
}

// ── Click Handler ─────────────────────────────────────────────────────────────

function clickSquare(i){

    if(mode === "remove"){
        pieces[i] = "";
        effects.delete(i);
        mode = "move";
        setModeBtn(null);
        drawBoard();
        pushState();
        return;
    }

    if(mode === "add"){
        if(addPieceType){ pieces[i] = addPieceType; drawBoard(); pushState(); }
        return;
    }

    if(mode === "tileEffect"){
        if(selectedTileColor === null) tileEffects.delete(i);
        else tileEffects.set(i, selectedTileColor);
        mode = "move";
        setModeBtn(null);
        drawBoard();
        pushState();
        return;
    }

    if(mode === "effect"){
        if(selectedEffectColor === null) effects.delete(i);
        else effects.set(i, selectedEffectColor);
        mode = "move";
        setModeBtn(null);
        drawBoard();
        pushState();
        return;
    }

    // Move mode
    if(selected === null){
        if(pieces[i] !== ""){ selected = i; drawBoard(); }
    } else {
        if(selected === i){ selected = null; drawBoard(); return; }

        let prevEffect = effects.get(selected);
        effects.delete(selected);
        effects.delete(i);
        if(prevEffect !== undefined) effects.set(i, prevEffect);

        pieces[i]       = pieces[selected];
        pieces[selected] = "";
        selected        = null;

        let justMoved = turn;

        if(extraTurnPending){
            extraTurnPending = false;
            let btn = document.getElementById("extraTurnBtn");
            btn.style.background  = "";
            btn.style.borderColor = "";
            btn.style.color       = "";
            btn.innerText = "⚡ Extra Turn";
            drawBoard();
            drawPowerSidebar();
            pushState();
        } else {
            globalMoveCount++;
            tickPowers(justMoved);
            turn = (justMoved === "White") ? "Black" : "White";
            drawBoard();
            drawPowerSidebar();
            pushState();
            checkForPowerUnlock(justMoved);
        }
    }
}

// ── Reset ─────────────────────────────────────────────────────────────────────

document.getElementById("resetBtn").onclick = () => {
    pieces = [
        "Br","Bn","Bb","Bq","Bk","Bb","Bn","Br",
        "Bp","Bp","Bp","Bp","Bp","Bp","Bp","Bp",
        "","","","","","","","",
        "","","","","","","","",
        "","","","","","","","",
        "","","","","","","","",
        "Wp","Wp","Wp","Wp","Wp","Wp","Wp","Wp",
        "Wr","Wn","Wb","Wq","Wk","Wb","Wn","Wr"
    ];
    effects      = new Map();
    tileEffects  = new Map();
    selected     = null;
    turn         = "White";
    globalMoveCount  = 0;
    activePowers = [];
    mode         = "move";
    addPieceType = null;
    extraTurnPending = false;
    let etBtn = document.getElementById("extraTurnBtn");
    etBtn.style.background = ""; etBtn.style.borderColor = ""; etBtn.style.color = "";
    etBtn.innerText = "⚡ Extra Turn";
    setModeBtn(null);
    drawBoard();
    drawPowerSidebar();
    pushState();
};

// ── Init ──────────────────────────────────────────────────────────────────────

buildEffectPicker();
buildPicker();
drawBoard();
drawPowerSidebar();

</script>
