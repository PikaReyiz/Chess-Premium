<!DOCTYPE html>
<html>
<head>
<title>Chess Board with Manual Powers</title>
<style>

.controls{
    margin-top:20px;
}

.tool-btn{
    margin:5px;
    padding:6px 12px;
    background:#222;
    color:white;
    border:1px solid #555;
    cursor:pointer;
}

.tool-btn:hover{
    background:#444;
}

/* piece effect overlay */
.effect-red{
    filter: drop-shadow(0 0 6px red);
    background: linear-gradient(45deg, red, black);
    border-radius:50%;
}
body {
    font-family: Arial;
    text-align: center;
    background-color: #0d1117;
    margin: 0;
    padding: 20px;
    color: white;
}

.container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 20px;
}

.board {
    position: relative;
    width: 480px;
    height: 480px;
    background-image: url('IMG/IMG/chessboard.png');
    background-size: cover;
    background-position: center;
    display: grid;
    grid-template-columns: repeat(8, 60px);
    grid-template-rows: repeat(8, 60px);
}

.square {
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.square.selected {
    outline: 2px solid red;
}

img.piece {
    width: 50px;
    height: 50px;
    user-select: none;
}

/* Powers styling */
#powersContainer, #activePowersContainer {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
}

.power-btn {
    margin: 5px 0;
    padding: 5px 10px;
    cursor: pointer;
    background-color: #222;
    border: 1px solid #555;
    color: white;
}

.power-btn:hover {
    background-color: #555;
}

.active-power {
    margin: 5px 0;
    padding: 5px 10px;
    background-color: #444;
    border: 1px solid #888;
}
</style>
</head>
<body>
    <div class="controls">
    <button class="tool-btn" onclick="setMode('add')">Add Piece</button>
    <button class="tool-btn" onclick="setMode('remove')">Remove Piece</button>
    <button class="tool-btn" onclick="setMode('effect')">Color Effect</button>
</div>

<h1>Shared Chess Board</h1>
<h2 id="turn">Current Turn: White</h2>
<button id="resetBtn">Reset Board</button>

<div class="container">
    <div id="board" class="board"></div>
    <div id="powersContainer"></div>
    <div id="activePowersContainer">
        <h3>Active Powers</h3>
    </div>
</div>

<script>
// --- Chess pieces setup ---
let pieces = [
    "Br","Bn","Bb","Bq","Bk","Bb","Bn","Br",
    "Bp","Bp","Bp","Bp","Bp","Bp","Bp","Bp",
    "","","","","","","","",
    "","","","","","","","",
    "","","","","","","","",
    "","","","","","","","",
    "Wp","Wp","Wp","Wp","Wp","Wp","Wp","Wp",
    "Wr","Wn","Wb","Wq","Wk","Wb","Wn","Wr"
];

let selected = null;
let turn = "White";
let turnCount = 0;
let mode = "move"; // move, add, remove, effect
let addPieceType = "Wp"; // default piece to add

// --- Powers setup ---
let powerPool = [];
// Example: 20+ powers for future expansion
for(let i=1;i<=20;i++){
    powerPool.push({name:`Power${i}`, duration:3}); // default 3 turns
}

let currentPowers = [];
let activePowers = [];

// --- Draw board ---
function drawBoard() {
    let board = document.getElementById("board");
    board.innerHTML = "";

    for(let i=0;i<64;i++){
        let square = document.createElement("div");
        square.className = "square";
        if(i===selected) square.classList.add("selected");

        if(pieces[i]!==""){
            let img = document.createElement("img");
            img.className="piece";
            img.src=`IMG/IMG/${pieces[i]}.png`;
            square.appendChild(img);
        }

        square.onclick = () => clickSquare(i);
        board.appendChild(square);
    }

    document.getElementById("turn").innerText = `Current Turn: ${turn}`;
}

// --- Draw powers ---
function drawPowers() {
    const powersDiv = document.getElementById("powersContainer");
    powersDiv.innerHTML = "";
    currentPowers.forEach((power, index)=>{
        const btn = document.createElement("button");
        btn.className="power-btn";
        btn.innerText = `${power.name}`;
        btn.onclick = ()=>{
            pickPower(power, index);
        };
        powersDiv.appendChild(btn);
    });

    // Draw active powers
    const activeDiv = document.getElementById("activePowersContainer");
    activeDiv.innerHTML = "<h3>Active Powers</h3>";
    activePowers.forEach(p=>{
        const div = document.createElement("div");
        div.className="active-power";
        div.innerText=`${p.name} (${p.duration} turns left)`;
        activeDiv.appendChild(div);
    });
}

// --- Pick a power ---
function pickPower(power, index){
    activePowers.push({...power}); // copy into active powers
    currentPowers.splice(index,1); // remove from current
    drawPowers();
}
    function setMode(m){
    mode = m;

    if(m==="add"){
        let piece = prompt("Piece code? (Wp,Wn,Wb,Wr,Wq,Wk,Bp,Bn,Bb,Br,Bq,Bk)");
        if(piece) addPieceType = piece;
    }
}

// --- Handle piece selection and move ---
function clickSquare(i){

    if(mode==="remove"){
        pieces[i]="";
        drawBoard();
        return;
    }

    if(mode==="add"){
        if(pieces[i]===""){
            pieces[i]=addPieceType;
        }
        drawBoard();
        return;
    }

    if(mode==="effect"){
        let board = document.getElementById("board").children[i];
        let img = board.querySelector("img");
        if(img){
            img.classList.toggle("effect-red");
        }
        return;
    }

    // NORMAL MOVE SYSTEM
    if(selected===null){
        if(pieces[i]!=="") selected=i;
    }else{
        pieces[i]=pieces[selected];
        pieces[selected]="";
        selected=null;

        turnCount++;

        activePowers.forEach(p=>p.duration--);
        activePowers = activePowers.filter(p=>p.duration>0);

        turn = (turn==="White")?"Black":"White";

        currentPowers = [...powerPool].sort(()=>0.5-Math.random()).slice(0,3);

        drawBoard();
        drawPowers();
    }

}

// --- Reset board ---
document.getElementById("resetBtn").onclick=()=>{
    pieces = [
        "Br","Bn","Bb","Bq","Bk","Bb","Bn","Br",
        "Bp","Bp","Bp","Bp","Bp","Bp","Bp","Bp",
        "","","","","","","","",
        "","","","","","","","",
        "","","","","","","","",
        "","","","","","","","",
        "Wp","Wp","Wp","Wp","Wp","Wp","Wp","Wp",
        "Wr","Wn","Wb","Wq","Wk","Wb","Wn","Wr"
    ];
    selected = null;
    turn = "White";
    turnCount=0;
    currentPowers=[];
    activePowers=[];
    drawBoard();
    drawPowers();
}

// Initial draw
drawBoard();
drawPowers();
</script>

</body>
</html>
