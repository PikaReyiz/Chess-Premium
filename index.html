<!DOCTYPE html>
<html>
<head>
<title>Chess Board</title>
<style>
body{
font-family:Arial;
text-align:center;
}
.board{
display:grid;
grid-template-columns:repeat(8,60px);
width:480px;
margin:auto;
}
.square{
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
}
.white{background:#eee;}
.black{background:#777;color:white;}
</style>
</head>

<body>

<h1>Shared Chess Board</h1>

<div id="board" class="board"></div>

<script>

let pieces=[
"br","bn","bb","bq","bk","bb","bn","br",
"bp","bp","bp","bp","bp","bp","bp","bp",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"wp","wp","wp","wp","wp","wp","wp","wp",
"wr","wn","wb","wq","wk","wb","wn","wr"
]

let selected=null

function draw(){
let board=document.getElementById("board")
board.innerHTML=""

for(let i=0;i<64;i++){

let square=document.createElement("div")

square.className="square "+((Math.floor(i/8)+i)%2==0?"white":"black")

if(pieces[i]!=""){
square.innerHTML="<img src='images/"+pieces[i]+".png' width='50'>"
}

square.onclick=()=>clickSquare(i)

board.appendChild(square)

}
}

function clickSquare(i){

if(selected===null){

selected=i

}else{

pieces[i]=pieces[selected]

pieces[selected]=""

selected=null

function draw(){
let board=document.getElementById("board")
board.innerHTML=""

for(let i=0;i<64;i++){

let square=document.createElement("div")

square.className="square "+((Math.floor(i/8)+i)%2==0?"white":"black")

if(pieces[i]!=""){
square.innerHTML="<img src='images/"+pieces[i]+".png' width='50'>"
}

square.onclick=()=>clickSquare(i)

board.appendChild(square)

}
}

draw()

}

}

draw()

</script>

</body>
</html>
